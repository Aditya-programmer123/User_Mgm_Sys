<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Particle Background -->
    <div class="particles-container" id="particlesContainer"></div>
    
    <div class="app-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-content">
                <div class="logo">User Management System</div>
                <div class="nav-middle">
                    <a href="#users" class="nav-link active" onclick="switchTab('users')">Users</a>
                    <a href="#search" class="nav-link" onclick="switchTab('search')">Search</a>
                    <a href="#stats" class="nav-link" onclick="switchTab('stats')">Statistics</a>
                </div>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Users Tab -->
            <div id="users" class="tab-content active">
                <section class="section">
                    <h2>Add New User</h2>
                    <form id="userForm" class="form-grid">
                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" placeholder="Enter full name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" placeholder="Enter email" required>
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" placeholder="Enter age" min="0" max="120">
                        </div>
                        <div class="form-group">
                            <label for="hobbies">Hobbies (comma-separated)</label>
                            <input type="text" id="hobbies" placeholder="e.g., Reading, Gaming, Coding">
                        </div>
                        <div class="form-group full-width">
                            <label for="bio">Bio</label>
                            <textarea id="bio" placeholder="Enter user bio" maxlength="500"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary full-width">Add User</button>
                    </form>
                </section>

                <section class="section">
                    <div class="section-header">
                        <h2>All Users</h2>
                        <div class="pagination-controls">
                            <button class="btn btn-small" onclick="previousPage()">← Previous</button>
                            <span id="pageInfo" class="page-info">Page 1</span>
                            <button class="btn btn-small" onclick="nextPage()">Next →</button>
                            <button class="btn btn-small btn-danger" onclick="deleteAllUsers()">Clear All</button>
                        </div>
                    </div>
                    <div id="usersList" class="users-grid">
                        <p class="loading">Loading users...</p>
                    </div>
                </section>
            </div>

            <!-- Search Tab -->
            <div id="search" class="tab-content">
                <section class="section">
                    <h2>Search & Filter Users</h2>
                    <div class="search-options">
                        <div class="search-option">
                            <h3>Search by Name</h3>
                            <div class="search-form">
                                <input type="text" id="searchName" placeholder="Enter name to search...">
                                <button class="btn btn-primary" onclick="searchByName()">Search</button>
                            </div>
                            <div id="nameSearchResults" class="results-container"></div>
                        </div>

                        <div class="search-option">
                            <h3>Filter by Age Range</h3>
                            <div class="search-form">
                                <input type="number" id="minAge" placeholder="Min age" min="0" max="120">
                                <input type="number" id="maxAge" placeholder="Max age" min="0" max="120">
                                <button class="btn btn-primary" onclick="filterByAge()">Filter</button>
                            </div>
                            <div id="ageFilterResults" class="results-container"></div>
                        </div>

                        <div class="search-option">
                            <h3>Search by Hobby</h3>
                            <div class="search-form">
                                <input type="text" id="searchHobby" placeholder="Enter hobby...">
                                <button class="btn btn-primary" onclick="searchByHobby()">Search</button>
                            </div>
                            <div id="hobbySearchResults" class="results-container"></div>
                        </div>

                        <div class="search-option">
                            <h3>Text Search</h3>
                            <div class="search-form">
                                <input type="text" id="textSearch" placeholder="Search bio and name...">
                                <button class="btn btn-primary" onclick="performTextSearch()">Search</button>
                            </div>
                            <div id="textSearchResults" class="results-container"></div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Statistics Tab -->
            <div id="stats" class="tab-content">
                <section class="section">
                    <h2>User Statistics</h2>
                    <div id="statsContainer" class="stats-grid">
                        <p class="loading">Loading statistics...</p>
                    </div>
                </section>
            </div>
        </main>

        <!-- Edit Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeEditModal()">&times;</span>
                <h2>Edit User</h2>
                <form id="editForm" class="form-grid">
                    <div class="form-group">
                        <label for="editName">Name *</label>
                        <input type="text" id="editName" required>
                    </div>
                    <div class="form-group">
                        <label for="editEmail">Email *</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="editAge">Age</label>
                        <input type="number" id="editAge" min="0" max="120">
                    </div>
                    <div class="form-group">
                        <label for="editHobbies">Hobbies (comma-separated)</label>
                        <input type="text" id="editHobbies">
                    </div>
                    <div class="form-group full-width">
                        <label for="editBio">Bio</label>
                        <textarea id="editBio" maxlength="500"></textarea>
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
